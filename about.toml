# cargo-about configuration for the checked-in Rust third-party notices.
#
# The order is intentional: for dual-licensed dependencies, prefer the MIT
# option when available, then fall back to Apache-2.0 and other permissive
# licenses that appear in the resolved workspace graph.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# cbindgen is MPL-2.0 and is used only as a build/dev dependency for the C FFI
# header. Keep this crate-specific so a new MPL dependency is not accepted by
# accident.
[cbindgen]
accepted = ["MPL-2.0"]
