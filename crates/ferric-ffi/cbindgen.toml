# cbindgen configuration for ferric-ffi

language = "C"
include_guard = "FERRIC_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify manually. */"
tab_width = 4
style = "both"

# Documentation comments from Rust source
documentation = true
documentation_style = "c99"

[parse]
parse_deps = false

[export]
# Explicitly list the public types that cbindgen should export.
# FerricEngine is intentionally omitted here so cbindgen emits it as
# an opaque forward declaration rather than trying to expand its fields.
include = [
    "FerricError",
    "FerricStringEncoding",
    "FerricConflictStrategy",
    "FerricConfig",
    "FerricFactType",
    "FerricHaltReason",
    "FerricValueType",
    "FerricValue",
]

[struct]
rename_fields = "None"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[defines]
"feature = serde" = "FERRIC_SERDE"

[fn]
rename_args = "None"
