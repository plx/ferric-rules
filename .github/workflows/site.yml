name: Deploy Site

on:
  workflow_dispatch: {}
  # Enable this when the site should publish automatically from main.
  # push:
  #   branches: [main]
  #   paths:
  #     - "site/**"
  #     - ".github/workflows/site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and upload site
        uses: withastro/action@v6
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
