name: Perf Compare

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base commit SHA"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA"
        required: true
        type: string
  workflow_call:
    inputs:
      base_sha:
        description: "Base commit SHA"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.93.0"

jobs:
  perf-compare:
    name: Perf Comparison Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      # ── Base branch benchmarks ─────────────────────────────────────────
      - name: Benchmark base branch
        run: |
          git checkout ${{ inputs.base_sha }}
          python3 scripts/perf-collect.py \
            --commit-sha "${{ inputs.base_sha }}" \
            --output /tmp/base-perf-manifest.json

      # ── Head benchmarks ────────────────────────────────────────────────
      - name: Benchmark head
        run: |
          git checkout ${{ inputs.head_sha }}
          python3 scripts/perf-collect.py \
            --commit-sha "${{ inputs.head_sha }}" \
            --output /tmp/head-perf-manifest.json

      # ── Comparison report ──────────────────────────────────────────────
      - name: Generate comparison report
        continue-on-error: true
        run: |
          python3 scripts/perf-diff.py \
            /tmp/base-perf-manifest.json /tmp/head-perf-manifest.json \
            --report /tmp/perf-diff-report.md \
            --repo "${{ github.repository }}" \
            --base-sha "${{ inputs.base_sha }}" \
            --head-sha "${{ inputs.head_sha }}" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-diff-report
          retention-days: 30
          path: |
            /tmp/perf-diff-report.md
            /tmp/base-perf-manifest.json
            /tmp/head-perf-manifest.json
