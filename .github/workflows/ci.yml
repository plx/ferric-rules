name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_TOOLCHAIN: "1.93.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: ./scripts/preflight.sh check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: ./scripts/preflight.sh fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - run: ./scripts/preflight.sh clippy

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: ./scripts/preflight.sh test

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: bindings/go/go.mod
      - run: just build-go-ffi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: bindings/go

  go-test-stress:
    name: Go Stress Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: bindings/go/go.mod
      - run: just build-go-ffi
      - run: just test-go-stress 10

  python-bindings:
    name: Python Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build and test Python bindings
        working-directory: crates/ferric-python
        run: |
          uv sync
          uv run pytest tests/ -v

  node-bindings:
    name: Node.js Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli
      - name: Build native addon
        working-directory: crates/ferric-napi
        run: |
          npm install
          napi build --release
      - name: Build and lint TypeScript
        working-directory: packages/ferric
        run: |
          npm install
          npm run build
          npm run lint
      - name: Run TypeScript binding tests
        working-directory: packages/ferric
        run: npm test

  python-tools:
    name: Python Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install and check
        working-directory: tools/ferric-tools
        run: |
          uv sync
          uv run ruff format --check src/ tests/
          uv run ruff check src/ tests/
          uv run pytest -v

  clips-compat:
    name: CLIPS Compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: cargo test -p ferric --test clips_compat

  users-guide-examples:
    name: Users Guide Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: just check-examples
      - run: just check-examples-sync

  bench-smoke:
    name: Bench Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: cargo bench -p ferric -- --test

  bench-thresholds:
    name: Bench Thresholds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: ./scripts/bench-thresholds.sh
      - uses: actions/upload-artifact@v4
        with:
          name: bench-threshold-report
          path: |
            target/bench-threshold-report.json
            target/bench-threshold-report.md
            target/criterion/**/new/estimates.json

  bench-compare:
    name: Comparative Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install CLIPS and hyperfine
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clips
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb
      - name: Run comparative benchmarks
        run: ./scripts/bench-compare.sh --quick
      - uses: actions/upload-artifact@v4
        with:
          name: bench-compare-report
          path: |
            target/bench-compare/report.json
            target/bench-compare/report.md
